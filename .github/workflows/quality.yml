name: quality

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, intl, exif, gd, zip
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          composer install --no-interaction --prefer-dist
          php artisan key:generate

      - name: Pint
        run: composer lint

      - name: PHPStan
        run: composer analyse

      - name: PHPUnit
        run: composer test

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm run test:unit

      - name: Build
        run: npm run build
