services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file:
      - .env.docker
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    working_dir: /app
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      NUXT_API_BASE_INTERNAL: http://app:8000/api/v1
    volumes:
      - ./apps/web:/app
      - internetmyshop_web_node_modules:/app/node_modules
    ports:
      - "3001:3000"
    depends_on:
      app:
        condition: service_started

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env.docker
    ports:
      - "3307:3306"
    volumes:
      - internetmyshop_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  internetmyshop_mysql_data:
  internetmyshop_web_node_modules:
