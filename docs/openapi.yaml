openapi: 3.1.1
info:
  title: internetMyShop API
  version: 1.3.0
  contact:
    name: Rinat Sarmuldin
    email: ura07srr@gmail.com
  license:
    name: Proprietary - All rights reserved
  description: |
    API contract for the internetMyShop backend.

    The project combines a Laravel Blade storefront, a MoonShine admin panel
    and a separate Nuxt frontend with a BFF layer.

    This specification documents the public and authenticated customer API
    exposed under `/api/v1`.

    Notes:
    - catalog endpoints are public;
    - external API clients authenticate through Laravel Sanctum bearer tokens;
    - the Nuxt browser client reaches this API through its BFF layer;
    - basket endpoints are guest-friendly and rely on cookie-backed basket state.
servers:
  - url: /api/v1
    description: Same-host API base for local and Docker Swagger UI
  - url: http://localhost:8000/api/v1
    description: Typical local Laravel backend
  - url: http://localhost:8080/api/v1
    description: Docker development backend
tags:
  - name: Auth
    description: API registration, login, token introspection and logout flows
  - name: Catalog
    description: Public catalog, category, brand and product read endpoints
  - name: Basket
    description: Guest-friendly basket lifecycle and checkout
  - name: Profiles
    description: Saved delivery profiles for authenticated users
  - name: Orders
    description: Order history for the authenticated owner
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register API user and issue Sanctum token
      operationId: registerApiUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered user with token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login and issue Sanctum token
      operationId: loginApiUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated user with token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Invalid credentials
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current Sanctum-authenticated user
      operationId: getAuthenticatedUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthUser'
        '401':
          description: Unauthenticated
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current Sanctum token
      operationId: logoutApiUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out
  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all Sanctum tokens for current user
      operationId: logoutAllApiUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out from every device
  /catalog:
    get:
      tags: [Catalog]
      summary: Get catalog roots and popular brands
      operationId: getCatalogIndex
      responses:
        '200':
          description: Catalog index payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'
                      brands:
                        type: array
                        items:
                          $ref: '#/components/schemas/Brand'
  /categories/{category}:
    get:
      tags: [Catalog]
      summary: Get category and paginated products
      operationId: getCategory
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PriceFilter'
        - $ref: '#/components/parameters/NewFilter'
        - $ref: '#/components/parameters/HitFilter'
        - $ref: '#/components/parameters/SaleFilter'
      responses:
        '200':
          description: Category payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCategoryResponse'
  /brands/{brand}:
    get:
      tags: [Catalog]
      summary: Get brand and paginated products
      operationId: getBrand
      parameters:
        - in: path
          name: brand
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PriceFilter'
        - $ref: '#/components/parameters/NewFilter'
        - $ref: '#/components/parameters/HitFilter'
        - $ref: '#/components/parameters/SaleFilter'
      responses:
        '200':
          description: Brand payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogBrandResponse'
  /products/{product}:
    get:
      tags: [Catalog]
      summary: Get product detail
      operationId: getProduct
      parameters:
        - in: path
          name: product
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProductDetail'
  /basket:
    get:
      tags: [Basket]
      summary: Get current basket
      operationId: getBasket
      responses:
        '200':
          description: Basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
    delete:
      tags: [Basket]
      summary: Clear current basket
      operationId: clearBasket
      responses:
        '200':
          description: Empty basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
  /basket/items:
    post:
      tags: [Basket]
      summary: Add product to basket
      operationId: addBasketItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasketItemStoreRequest'
      responses:
        '200':
          description: Updated basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
  /basket/items/{product}:
    patch:
      tags: [Basket]
      summary: Set basket item quantity
      operationId: updateBasketItem
      parameters:
        - in: path
          name: product
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasketItemUpdateRequest'
      responses:
        '200':
          description: Updated basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
    delete:
      tags: [Basket]
      summary: Remove basket item
      operationId: deleteBasketItem
      parameters:
        - in: path
          name: product
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
  /basket/checkout:
    post:
      tags: [Basket]
      summary: Create order from current basket
      operationId: checkoutBasket
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Created order payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrderDetail'
        '422':
          description: Basket is empty or validation failed
  /profiles:
    get:
      tags: [Profiles]
      summary: List current user profiles
      operationId: getProfiles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profiles payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthenticated
    post:
      tags: [Profiles]
      summary: Create profile for current user
      operationId: createProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpsertRequest'
      responses:
        '201':
          description: Created profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
  /profiles/{profile}:
    get:
      tags: [Profiles]
      summary: Get profile owned by current user
      operationId: getProfile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profile
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
        '404':
          description: Not found
    patch:
      tags: [Profiles]
      summary: Update profile owned by current user
      operationId: updateProfile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profile
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpsertRequest'
      responses:
        '200':
          description: Updated profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
    delete:
      tags: [Profiles]
      summary: Delete profile owned by current user
      operationId: deleteProfile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profile
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Profile deleted
  /orders:
    get:
      tags: [Orders]
      summary: List current user orders
      operationId: getOrders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
        '401':
          description: Unauthenticated
  /orders/{order}:
    get:
      tags: [Orders]
      summary: Get order owned by current user
      operationId: getOrder
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: order
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrderDetail'
        '404':
          description: Not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    PriceFilter:
      in: query
      name: price
      schema:
        type: string
        enum: [min, max]
    NewFilter:
      in: query
      name: new
      schema:
        type: string
        enum: [yes]
    HitFilter:
      in: query
      name: hit
      schema:
        type: string
        enum: [yes]
    SaleFilter:
      in: query
      name: sale
      schema:
        type: string
        enum: [yes]
  schemas:
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        admin:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token_type:
              type: string
              example: Bearer
            access_token:
              type: string
            user:
              $ref: '#/components/schemas/AuthUser'
    Category:
      type: object
      properties:
        id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        name:
          type: string
        slug:
          type: string
        content:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        content:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        products_count:
          type: integer
          nullable: true
    ProductListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        price:
          type: number
        image:
          type: string
          nullable: true
        flags:
          type: object
          properties:
            new:
              type: boolean
            hit:
              type: boolean
            sale:
              type: boolean
        brand:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
        category:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductListItem'
        - type: object
          properties:
            content:
              type: string
              nullable: true
    BasketItem:
      type: object
      properties:
        product_id:
          type: integer
        name:
          type: string
        slug:
          type: string
        price:
          type: number
        quantity:
          type: integer
        cost:
          type: number
        image:
          type: string
          nullable: true
        flags:
          type: object
          properties:
            new:
              type: boolean
            hit:
              type: boolean
            sale:
              type: boolean
    Basket:
      type: object
      properties:
        id:
          type: integer
        positions:
          type: integer
        amount:
          type: number
        items:
          type: array
          items:
            $ref: '#/components/schemas/BasketItem'
    Profile:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        comment:
          type: string
          nullable: true
    OrderItem:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
          nullable: true
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
        cost:
          type: number
        product:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            slug:
              type: string
    OrderStatus:
      type: object
      properties:
        code:
          type: integer
        label:
          type: string
          nullable: true
    OrderSummary:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        status:
          $ref: '#/components/schemas/OrderStatus'
        items_count:
          type: integer
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            phone:
              type: string
            address:
              type: string
            comment:
              type: string
              nullable: true
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    CatalogCategoryResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            category:
              $ref: '#/components/schemas/Category'
            products:
              type: array
              items:
                $ref: '#/components/schemas/ProductListItem'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    CatalogBrandResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            brand:
              $ref: '#/components/schemas/Brand'
            products:
              type: array
              items:
                $ref: '#/components/schemas/ProductListItem'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    BasketItemStoreRequest:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: integer
        quantity:
          type: integer
          minimum: 1
    BasketItemUpdateRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
    CheckoutRequest:
      type: object
      required: [name, email, phone, address]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        comment:
          type: string
          nullable: true
    ProfileUpsertRequest:
      type: object
      required: [title, name, email, phone, address]
      properties:
        title:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        comment:
          type: string
          nullable: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        device_name:
          type: string
          nullable: true
    RegisterRequest:
      allOf:
        - $ref: '#/components/schemas/LoginRequest'
        - type: object
          required: [name, password_confirmation]
          properties:
            name:
              type: string
            password_confirmation:
              type: string
