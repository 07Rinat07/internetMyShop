openapi: 3.1.1
info:
  title: internetMyShop API
  version: 1.6.0
  contact:
    name: Rinat Sarmuldin
    email: ura07srr@gmail.com
  license:
    name: Proprietary - All rights reserved
  description: |
    API contract for the internetMyShop backend.

    The project combines a Laravel Blade storefront, a MoonShine admin panel
    and a separate Nuxt frontend with a BFF layer.

    This specification documents the public and authenticated customer API
    exposed under `/api/v1`.

    Notes:
    - catalog endpoints are public;
    - external API clients authenticate through Laravel Sanctum bearer tokens;
    - the Nuxt browser client reaches this API through its BFF layer;
    - basket endpoints are guest-friendly and rely on cookie-backed basket state;
    - payment success is confirmed by backend finalization and verified webhooks, not by browser return alone;
    - monetary values are calculated server-side with exact decimal handling and may be returned as integers or fractional numbers depending on the value.
servers:
  - url: /api/v1
    description: Same-host API base for local and Docker Swagger UI
  - url: http://localhost:8000/api/v1
    description: Typical local Laravel backend
  - url: http://localhost:8080/api/v1
    description: Docker development backend
tags:
  - name: Auth
    description: API registration, login, token introspection and logout flows
  - name: Catalog
    description: Public catalog, category, brand and product read endpoints
  - name: Basket
    description: Guest-friendly basket lifecycle and checkout
  - name: Profiles
    description: Saved delivery profiles for authenticated users
  - name: Orders
    description: Order history for the authenticated owner
  - name: Payments
    description: Payment session status and provider webhook endpoints
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register API user and issue Sanctum token
      operationId: registerApiUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered user with token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login and issue Sanctum token
      operationId: loginApiUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated user with token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Invalid credentials
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current Sanctum-authenticated user
      operationId: getAuthenticatedUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthUser'
        '401':
          description: Unauthenticated
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current Sanctum token
      operationId: logoutApiUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out
  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all Sanctum tokens for current user
      operationId: logoutAllApiUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out from every device
  /catalog:
    get:
      tags: [Catalog]
      summary: Get catalog roots and popular brands
      operationId: getCatalogIndex
      responses:
        '200':
          description: Catalog index payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'
                      brands:
                        type: array
                        items:
                          $ref: '#/components/schemas/Brand'
  /home:
    get:
      tags: [Catalog]
      summary: Get storefront home payload
      operationId: getStorefrontHome
      responses:
        '200':
          description: Home payload with featured storefront sections
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/HomePayload'
  /categories/{category}:
    get:
      tags: [Catalog]
      summary: Get category and paginated products
      operationId: getCategory
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PriceFilter'
        - $ref: '#/components/parameters/NewFilter'
        - $ref: '#/components/parameters/HitFilter'
        - $ref: '#/components/parameters/SaleFilter'
      responses:
        '200':
          description: Category payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCategoryResponse'
  /brands/{brand}:
    get:
      tags: [Catalog]
      summary: Get brand and paginated products
      operationId: getBrand
      parameters:
        - in: path
          name: brand
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PriceFilter'
        - $ref: '#/components/parameters/NewFilter'
        - $ref: '#/components/parameters/HitFilter'
        - $ref: '#/components/parameters/SaleFilter'
      responses:
        '200':
          description: Brand payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogBrandResponse'
  /products/{product}:
    get:
      tags: [Catalog]
      summary: Get product detail
      operationId: getProduct
      parameters:
        - in: path
          name: product
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProductDetail'
  /basket:
    get:
      tags: [Basket]
      summary: Get current basket
      operationId: getBasket
      responses:
        '200':
          description: Basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
    delete:
      tags: [Basket]
      summary: Clear current basket
      operationId: clearBasket
      responses:
        '200':
          description: Empty basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
  /basket/items:
    post:
      tags: [Basket]
      summary: Add product to basket
      operationId: addBasketItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasketItemStoreRequest'
      responses:
        '200':
          description: Updated basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
  /basket/items/{product}:
    patch:
      tags: [Basket]
      summary: Set basket item quantity
      operationId: updateBasketItem
      parameters:
        - in: path
          name: product
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasketItemUpdateRequest'
      responses:
        '200':
          description: Updated basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
    delete:
      tags: [Basket]
      summary: Remove basket item
      operationId: deleteBasketItem
      parameters:
        - in: path
          name: product
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated basket payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Basket'
  /basket/checkout:
    post:
      tags: [Basket]
      summary: Create order and optionally initiate payment from current basket
      description: |
        Creates the local order first.

        When `payment_method=online_card`, the backend also creates a local payment
        attempt and initializes the active provider session.

        Storefronts should treat the returned payment object as the source for the
        next checkout step, but must not treat browser redirects as proof of success.
      operationId: checkoutBasket
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Created order payload with optional payment session
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CheckoutResponse'
        '422':
          description: Basket is empty or validation failed
        '502':
          description: Payment provider session could not be created
  /payments/{payment}:
    get:
      tags: [Payments]
      summary: Get public payment status by opaque payment id
      description: |
        Returns the current public payment state plus the related order summary.

        This endpoint is suitable for payment status pages shown after checkout or
        after provider return.
      operationId: getPaymentStatus
      parameters:
        - in: path
          name: payment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment status payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PaymentDetail'
        '404':
          description: Payment not found
  /payments/{payment}/checkout-config:
    get:
      tags: [Payments]
      summary: Get hosted checkout configuration for a payment attempt
      description: |
        Returns provider checkout configuration used by storefront UIs to render
        hosted payment fields or widgets.

        Current storefront implementations are optimized for `hosted_fields`.
      operationId: getPaymentCheckoutConfig
      parameters:
        - in: path
          name: payment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hosted payment configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PaymentCheckoutConfig'
        '404':
          description: Payment not found
  /payments/{payment}/capture:
    post:
      tags: [Payments]
      summary: Perform server-side capture for the current payment attempt
      description: |
        Performs server-to-server payment finalization for the active payment attempt.

        This endpoint is typically called after hosted card submission or provider
        approval callback data has been received by the storefront.
      operationId: capturePayment
      parameters:
        - in: path
          name: payment
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider_payment_id:
                  type: string
                  nullable: true
                payer_id:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Updated payment payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PaymentDetail'
        '422':
          description: Capture failed
  /payments/webhook/{provider}:
    post:
      tags: [Payments]
      summary: Receive provider webhook for payment state changes
      description: |
        Public backend webhook endpoint for provider notifications.

        Providers must call the Laravel backend host, not the Nuxt storefront host.
      operationId: handlePaymentWebhook
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            example: paypal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      payment_id:
                        type: string
                      status:
                        type: string
        '422':
          description: Invalid webhook signature or payload
  /profiles:
    get:
      tags: [Profiles]
      summary: List current user profiles
      operationId: getProfiles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profiles payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthenticated
    post:
      tags: [Profiles]
      summary: Create profile for current user
      operationId: createProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpsertRequest'
      responses:
        '201':
          description: Created profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
  /profiles/{profile}:
    get:
      tags: [Profiles]
      summary: Get profile owned by current user
      operationId: getProfile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profile
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
        '404':
          description: Not found
    put:
      tags: [Profiles]
      summary: Replace profile owned by current user
      operationId: replaceProfile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profile
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpsertRequest'
      responses:
        '200':
          description: Updated profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
    patch:
      tags: [Profiles]
      summary: Update profile owned by current user
      operationId: updateProfile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profile
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpsertRequest'
      responses:
        '200':
          description: Updated profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
    delete:
      tags: [Profiles]
      summary: Delete profile owned by current user
      operationId: deleteProfile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profile
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Profile deleted
  /orders:
    get:
      tags: [Orders]
      summary: List current user orders
      operationId: getOrders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
        '401':
          description: Unauthenticated
  /orders/{order}:
    get:
      tags: [Orders]
      summary: Get order owned by current user
      operationId: getOrder
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: order
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrderDetail'
        '404':
          description: Not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    PriceFilter:
      in: query
      name: price
      schema:
        type: string
        enum: [min, max]
    NewFilter:
      in: query
      name: new
      schema:
        type: string
        enum: [yes]
    HitFilter:
      in: query
      name: hit
      schema:
        type: string
        enum: [yes]
    SaleFilter:
      in: query
      name: sale
      schema:
        type: string
        enum: [yes]
  schemas:
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        admin:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token_type:
              type: string
              example: Bearer
            access_token:
              type: string
            user:
              $ref: '#/components/schemas/AuthUser'
    Category:
      type: object
      properties:
        id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        name:
          type: string
        slug:
          type: string
        content:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        content:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        products_count:
          type: integer
          nullable: true
    ProductListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        price:
          type: number
        image:
          type: string
          nullable: true
        flags:
          type: object
          properties:
            new:
              type: boolean
            hit:
              type: boolean
            sale:
              type: boolean
        brand:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
        category:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductListItem'
        - type: object
          properties:
            content:
              type: string
              nullable: true
    BasketItem:
      type: object
      properties:
        product_id:
          type: integer
        name:
          type: string
        slug:
          type: string
        price:
          type: number
        quantity:
          type: integer
        cost:
          type: number
        image:
          type: string
          nullable: true
        flags:
          type: object
          properties:
            new:
              type: boolean
            hit:
              type: boolean
            sale:
              type: boolean
        brand:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
        category:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
    Basket:
      type: object
      properties:
        id:
          type: integer
        positions:
          type: integer
        amount:
          type: number
          description: Exact basket total returned as a JSON number.
        items:
          type: array
          items:
            $ref: '#/components/schemas/BasketItem'
    Profile:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        comment:
          type: string
          nullable: true
    OrderItem:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
          nullable: true
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
        cost:
          type: number
        product:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            slug:
              type: string
    OrderStatus:
      type: object
      properties:
        code:
          type: integer
        label:
          type: string
          nullable: true
    PaymentStatus:
      type: object
      properties:
        code:
          type: string
        label:
          type: string
          nullable: true
    PaymentProvider:
      type: object
      properties:
        code:
          type: string
        label:
          type: string
          nullable: true
    PaymentMethod:
      type: object
      properties:
        code:
          type: string
          enum: [online_card, manager_confirmation]
        label:
          type: string
          nullable: true
    OrderSummary:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
          description: Exact order total returned as a JSON number.
        currency:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        items_count:
          type: integer
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            phone:
              type: string
            address:
              type: string
            comment:
              type: string
              nullable: true
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'
    PaymentDetail:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
          description: Amount that the provider charges in provider currency.
        currency:
          type: string
          description: Provider charge currency.
        store_amount:
          type: number
          description: Original storefront order amount before provider conversion.
        store_currency:
          type: string
          description: Storefront order currency.
        conversion_rate:
          type: number
          description: Exchange rate used when provider currency differs from storefront currency.
        checkout_flow:
          type: string
          enum: [hosted_fields, redirect]
          description: Storefront continuation model for this payment.
        status:
          $ref: '#/components/schemas/PaymentStatus'
        provider:
          $ref: '#/components/schemas/PaymentProvider'
        redirect_url:
          type: string
          nullable: true
          description: Redirect target for providers that require external checkout pages.
        failure_reason:
          type: string
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        order:
          $ref: '#/components/schemas/OrderSummary'
      example:
        id: 8e42f652-df13-4f57-b5a7-f8a3fd1d4ba7
        amount: 5.88
        currency: USD
        store_amount: 3000
        store_currency: KZT
        conversion_rate: 510
        checkout_flow: hosted_fields
        status:
          code: pending
          label: Pending confirmation
        provider:
          code: paypal
          label: PayPal
        redirect_url: null
        failure_reason: null
        paid_at: null
        created_at: '2026-03-09T10:00:00Z'
        updated_at: '2026-03-09T10:00:00Z'
        order:
          id: 101
          amount: 3000
          currency: KZT
          status:
            code: 0
            label: New
          payment_method:
            code: online_card
            label: Online card
          items_count: 2
          created_at: '2026-03-09T10:00:00Z'
          updated_at: '2026-03-09T10:00:00Z'
    CheckoutResponse:
      type: object
      properties:
        order:
          $ref: '#/components/schemas/OrderDetail'
        payment:
          allOf:
            - $ref: '#/components/schemas/PaymentDetail'
          nullable: true
    PaymentCheckoutConfig:
      type: object
      properties:
        payment_id:
          type: string
        flow:
          type: string
          enum: [hosted_fields]
          description: Hosted storefront flow currently supported by project UIs.
        status_url:
          type: string
        provider_payment_id:
          type: string
          nullable: true
        capture_url:
