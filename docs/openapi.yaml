openapi: 3.1.1
info:
  title: internetMyShop API
  version: 1.0.0
  description: Catalog API for the first API-first refactor stage.
servers:
  - url: http://localhost/api/v1
paths:
  /catalog:
    get:
      summary: Get catalog roots and popular brands
      operationId: getCatalogIndex
      tags: [Catalog]
      responses:
        '200':
          description: Catalog index payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'
                      brands:
                        type: array
                        items:
                          $ref: '#/components/schemas/Brand'
  /categories/{slug}:
    get:
      summary: Get category and paginated products
      operationId: getCategory
      tags: [Catalog]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: price
          schema:
            type: string
            enum: [min, max]
        - in: query
          name: new
          schema:
            type: string
            enum: [yes]
        - in: query
          name: hit
          schema:
            type: string
            enum: [yes]
        - in: query
          name: sale
          schema:
            type: string
            enum: [yes]
      responses:
        '200':
          description: Category payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogListingResponse'
  /brands/{slug}:
    get:
      summary: Get brand and paginated products
      operationId: getBrand
      tags: [Catalog]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: price
          schema:
            type: string
            enum: [min, max]
        - in: query
          name: new
          schema:
            type: string
            enum: [yes]
        - in: query
          name: hit
          schema:
            type: string
            enum: [yes]
        - in: query
          name: sale
          schema:
            type: string
            enum: [yes]
      responses:
        '200':
          description: Brand payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogListingResponse'
  /products/{slug}:
    get:
      summary: Get product detail
      operationId: getProduct
      tags: [Catalog]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProductDetail'
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        name:
          type: string
        slug:
          type: string
        content:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        content:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        products_count:
          type: integer
          nullable: true
    ProductListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        price:
          type: number
          format: float
        image:
          type: string
          nullable: true
        flags:
          type: object
          properties:
            new:
              type: boolean
            hit:
              type: boolean
            sale:
              type: boolean
        brand:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
        category:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductListItem'
        - type: object
          properties:
            content:
              type: string
              nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    CatalogListingResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            category:
              $ref: '#/components/schemas/Category'
            brand:
              $ref: '#/components/schemas/Brand'
            products:
              type: array
              items:
                $ref: '#/components/schemas/ProductListItem'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
        links:
          $ref: '#/components/schemas/PaginationLinks'
